apiVersion: v1
kind: Pod
metadata:
  name: gemini-python
  labels:
    app: gemini-python
    tool: gemini-cli
    lang: python
    agent-container: "true"
spec:
  IMAGE_PULL_SECRET_BLOCK
  containers:
    - name: gemini-python
      image: REGISTRY/gemini-cli-python:IMAGE_TAG
      env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-secret
              key: GEMINI_API_KEY
        - name: GIT_SSH_COMMAND
          value: "ssh -i /home/node/.ssh/id_rsa -o StrictHostKeyChecking=accept-new"
      volumeMounts:
        - name: github-ssh
          mountPath: /run/secrets/github
          readOnly: true
      stdin: true
      tty: true
      resources:
        requests:
          memory: "256Mi"
          cpu: "250m"
        limits:
          memory: "1Gi"
          cpu: "1000m"
  volumes:
    - name: github-ssh
      secret:
        secretName: github-secret
        defaultMode: 0444
        items:
          - key: ssh_private_key
            path: id_rsa
  restartPolicy: Never
