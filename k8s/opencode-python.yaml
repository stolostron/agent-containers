apiVersion: v1
kind: Pod
metadata:
  name: opencode-python
  labels:
    app: opencode-python
    tool: opencode
    lang: python
spec:
  IMAGE_PULL_SECRET_BLOCK
  containers:
    - name: opencode-python
      image: REGISTRY/opencode-python:IMAGE_TAG
      env:
        # Claude via Vertex AI
        - name: GOOGLE_CLOUD_PROJECT
          valueFrom:
            secretKeyRef:
              name: opencode-secret
              key: GOOGLE_CLOUD_PROJECT
        - name: VERTEX_LOCATION
          valueFrom:
            secretKeyRef:
              name: opencode-secret
              key: VERTEX_LOCATION
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /app/gcloud/credentials.json
        # Gemini via Google API key
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: opencode-secret
              key: GOOGLE_API_KEY
        # GitHub PAT for git HTTPS auth (optional)
        - name: GITHUB_PAT
          valueFrom:
            secretKeyRef:
              name: opencode-secret
              key: GITHUB_PAT
              optional: true
      volumeMounts:
        - name: gcloud-creds
          mountPath: /app/gcloud
          readOnly: true
      stdin: true
      tty: true
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "2000m"
  volumes:
    - name: gcloud-creds
      secret:
        secretName: opencode-secret
        items:
          - key: application_default_credentials.json
            path: credentials.json
  restartPolicy: Never
