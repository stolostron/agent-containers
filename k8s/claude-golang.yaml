apiVersion: v1
kind: Pod
metadata:
  name: claude-golang
  labels:
    app: claude-golang
    tool: claude-code
    lang: golang
    agent-container: "true"
spec:
  IMAGE_PULL_SECRET_BLOCK
  containers:
    - name: claude-golang
      image: REGISTRY/claude-code-golang:IMAGE_TAG
      env:
        - name: CLAUDE_CODE_USE_VERTEX
          value: "1"
        - name: ANTHROPIC_VERTEX_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: claude-vertex-secret
              key: ANTHROPIC_VERTEX_PROJECT_ID
        - name: CLOUD_ML_REGION
          valueFrom:
            secretKeyRef:
              name: claude-vertex-secret
              key: CLOUD_ML_REGION
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /app/gcloud/credentials.json
        - name: GIT_SSH_COMMAND
          value: "ssh -i /home/node/.ssh/id_rsa -o StrictHostKeyChecking=accept-new"
      volumeMounts:
        - name: gcloud-creds
          mountPath: /app/gcloud
          readOnly: true
        - name: github-ssh
          mountPath: /run/secrets/github
          readOnly: true
      stdin: true
      tty: true
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "2000m"
  volumes:
    - name: gcloud-creds
      secret:
        secretName: claude-vertex-secret
        items:
          - key: application_default_credentials.json
            path: credentials.json
    - name: github-ssh
      secret:
        secretName: github-secret
        defaultMode: 0444
        items:
          - key: ssh_private_key
            path: id_rsa
  restartPolicy: Never
