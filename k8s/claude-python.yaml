apiVersion: v1
kind: Pod
metadata:
  name: claude-python
  labels:
    app: claude-python
    tool: claude-code
    lang: python
spec:
  IMAGE_PULL_SECRET_BLOCK
  containers:
    - name: claude-python
      image: REGISTRY/claude-code-python:IMAGE_TAG
      env:
        - name: CLAUDE_CODE_USE_VERTEX
          value: "1"
        - name: ANTHROPIC_VERTEX_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: claude-vertex-secret
              key: ANTHROPIC_VERTEX_PROJECT_ID
        - name: CLOUD_ML_REGION
          valueFrom:
            secretKeyRef:
              name: claude-vertex-secret
              key: CLOUD_ML_REGION
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /app/gcloud/credentials.json
      volumeMounts:
        - name: gcloud-creds
          mountPath: /app/gcloud
          readOnly: true
      stdin: true
      tty: true
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "2000m"
  volumes:
    - name: gcloud-creds
      secret:
        secretName: claude-vertex-secret
        items:
          - key: application_default_credentials.json
            path: credentials.json
  restartPolicy: Never
